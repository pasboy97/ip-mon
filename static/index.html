<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Real-time Network Monitoring Dashboard - Monitor IP addresses with live status updates and ping graphs">
    <title>Network Monitor — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="2" y1="12" x2="22" y2="12" />
                            <path
                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                        </svg>
                    </div>
                    <div>
                        <h1>Network Monitor</h1>
                        <p class="header-subtitle">Real-time Infrastructure Monitoring</p>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="last-update" id="lastUpdate">
                    <span class="update-dot"></span>
                    <span>Menunggu data...</span>
                </div>
                <button class="btn-refresh" id="btnRefresh" title="Refresh Manual">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Add Host Form -->
        <section class="add-host-section">
            <div class="add-host-form" id="addHostForm">
                <div class="form-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                </div>
                <input type="text" id="inputIp" class="form-input" placeholder="IP Address (e.g. 192.168.1.100)"
                    autocomplete="off">
                <input type="text" id="inputLabel" class="form-input" placeholder="Label (e.g. Web Server)"
                    autocomplete="off">
                <button class="btn-add-host" id="btnAddHost" title="Tambah Host">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span>Tambah Host</span>
                </button>
            </div>
        </section>

        <!-- Summary Cards -->
        <section class="summary-grid" id="summaryGrid">
            <div class="summary-card summary-total">
                <div class="summary-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                        <line x1="8" y1="21" x2="16" y2="21" />
                        <line x1="12" y1="17" x2="12" y2="21" />
                    </svg>
                </div>
                <div class="summary-info">
                    <span class="summary-value" id="totalHosts">0</span>
                    <span class="summary-label">Total Hosts</span>
                </div>
            </div>
            <div class="summary-card summary-online">
                <div class="summary-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                </div>
                <div class="summary-info">
                    <span class="summary-value" id="onlineHosts">0</span>
                    <span class="summary-label">Online</span>
                </div>
            </div>
            <div class="summary-card summary-offline">
                <div class="summary-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                </div>
                <div class="summary-info">
                    <span class="summary-value" id="offlineHosts">0</span>
                    <span class="summary-label">Offline</span>
                </div>
            </div>
            <div class="summary-card summary-latency">
                <div class="summary-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                </div>
                <div class="summary-info">
                    <span class="summary-value" id="avgLatency">—</span>
                    <span class="summary-label">Avg Latency</span>
                </div>
            </div>
            <div class="summary-card summary-recording">
                <div class="summary-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="6" />
                    </svg>
                </div>
                <div class="summary-info">
                    <span class="summary-value" id="recordingCount">0</span>
                    <span class="summary-label">Recording</span>
                </div>
            </div>
        </section>

        <!-- Host Grid -->
        <section class="hosts-section">
            <div class="section-header">
                <h2>Monitored Hosts</h2>
                <div class="auto-refresh-badge">
                    <span class="pulse-ring"></span>
                    Auto-refresh 5s
                </div>
            </div>
            <div class="hosts-grid" id="hostsGrid">
                <!-- Cards will be populated by JavaScript -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Memuat data monitoring...</p>
                </div>
            </div>
        </section>

        <!-- Ping Graph Modal -->
        <div class="modal-overlay" id="graphModal">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                        </svg>
                        <span>Ping Graph — <strong id="modalHostLabel"></strong> (<span id="modalHostIp"></span>)</span>
                    </div>
                    <button class="modal-close" id="btnCloseModal" title="Tutup">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <canvas id="pingChart"></canvas>
                </div>
                <div class="modal-footer">
                    <span class="modal-info" id="modalInfo">Menunggu data...</span>
                    <button class="btn-modal-refresh" id="btnModalRefresh">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10" />
                            <polyline points="1 20 1 14 7 14" />
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                        </svg>
                        Refresh Graph
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>Network Monitor v2.0 &mdash; FastAPI + PostgreSQL + Async Ping</p>
    </footer>

    <script src="/static/script.js"></script>
</body>

</html>
